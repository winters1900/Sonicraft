name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm run install:all
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm audit
      - run: npm --prefix frontend audit --omit=dev
      - run: npm --prefix backend audit --omit=dev
